<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 페이지</title>
  <link th:href="@{/css/board.css}" rel="stylesheet">
</head>
<body>

<!-- Group 49 -->
<header>
  <div class="top-bar">
    <div class="login-actions">
      <span><a href="#">로그인</a></span>
      <span><a href="#">검색</a></span>
      <span><a href="#">마이페이지</a></span>
    </div>
    <!-- 검색창 (처음에는 숨김 상태) -->
    <div class="search-bar" id="search-bar">
      <input type="text" id="search-input" placeholder="검색어를 입력하세요">
      <button id="search-submit">검색</button>
    </div>
  </div>
</header>

<!-- 카테고리 메뉴 -->
<nav class="category-menu">
  <div class="categories">
    <a th:href="@{/category/1}">카테고리 1</a>
    <a th:href="@{/category/2}">카테고리 2</a>
    <a th:href="@{/category/3}">카테고리 3</a>
    <a th:href="@{/category/4}">카테고리 4</a>
  </div>
</nav>

<!-- 회원가입 추천 메시지 -->
<section class="recommendation">
  <p>회원가입시 날씨별 추천</p>
</section>

<!-- 이미지 섹션 -->
<section class="products">
  <div class="product">
    <img src="image.png" alt="Product 1">
  </div>
  <div class="product">
    <img src="image.png" alt="Product 2">
  </div>
  <div class="product">
    <img src="image.png" alt="Product 3">
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="footer">
    <p>tel : 010-xxxx-xxxx</p>
    <p>location : xxxx-xxxx-xxxx</p>
  </div>
</footer>

<!-- JavaScript -->
<script th:src="@{/js/boardsearch.js}"></script>

</body>
</html>
