<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑몰 검색 페이지</title>
  <link th:href="@{/css/category.css}" rel="stylesheet">
</head>
<body>

<div id="searchMenu" class="search-menu">

  <button class="search-btn">검색</button>
</div>

<!-- Main content -->
<div class="header">
  <div class="logo">
    <div class="menu" onclick="openSearch()">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>
  <div class="top-menu">
    <span>로그인 검색 마이페이지</span>
  </div>
</div>

<div class="category">
  <h1>카테고리</h1>
</div>

<div class="image-container">
  <div class="image-box"></div>
  <div class="image-box"></div>
  <div class="image-box"></div>
</div>

<div class="footer">
  <div class="contact">
    <p>tel: 010-xxxx-xxxx location: xxxx-xxxx-xxxx</p>
  </div>
</div>

<script th:src="@{/js/boardsearch.js}"></script>
</body>
</html>
