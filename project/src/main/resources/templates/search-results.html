<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과</title>
</head>
<body>
<h1>검색 결과</h1>
<!-- 검색 결과가 없을 때 메시지 출력 -->
<p th:if="${#lists.isEmpty(products)}">검색 결과가 없습니다.</p>

<ul th:if="${!#lists.isEmpty(products)}">
    <!-- 검색 결과 리스트를 출력 -->
    <li th:each="product : ${products}">
        <h2 th:text="${product.title}"></h2>
        <p th:text="${product.content}"></p>
        <p th:text="'가격: ' + ${product.price} + '원'"></p>
    </li>
</ul>
</body>
</html>
