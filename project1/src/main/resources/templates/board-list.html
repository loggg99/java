<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Page</title>
  <link th:href="@{/css/board.css}" rel="stylesheet">
</head>
<body>

<!-- Header Section -->
<header>
  <div class="top-menu">
    <div class="login-actions">
      <span><a href="#">로그인</a></span>
      <span><a href="#">검색</a></span>
      <span><a href="#">마이페이지</a></span>
    </div>
  </div>
  <nav class="category-menu">
    <ul>
      <a th:href="@{/category/1}">카테고리 1</a>
      <a th:href="@{/category/2}">카테고리 2</a>
      <a th:href="@{/category/3}">카테고리 3</a>
      <a th:href="@{/category/4}">카테고리 4</a>
    </ul>
    <div class="weather">
      <span>오늘의 날씨</span>
      <img src="weather_icon.png" alt="Weather Icon">
    </div>
  </nav>
  <div class="recommendation">
    <p>회원가입시 날씨별 추천</p>
  </div>
</header>

<!-- Product Section -->
<section class="products">
  <div class="product">
    <img src="jacket_image.jpg" alt="Jacket">
  </div>
  <div class="product">
    <img src="tshirt_image.jpg" alt="T-Shirt">
  </div>
  <div class="product">
    <img src="coat_image.jpg" alt="Coat">
  </div>
</section>

<!-- Footer Section -->
<footer>
  <p>tel : 010-xxxx-xxxx</p>
  <p>location : xxxx-xxxx-xxxx</p>
</footer>

</body>
</html>
